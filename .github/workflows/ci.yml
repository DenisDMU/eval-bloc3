name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # tourne EN PREMIER, bloque tout si secret détecté
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # obligatoire pour scanner tout l'historique

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif

  semgrep:
    needs: [security]  # attend que security soit OK
    name: Semgrep 
    runs-on: ubuntu-latest
    container:
        image: semgrep/semgrep
    if: (github.actor != 'dependabot[bot]')
    steps:
        - uses: actions/checkout@v4
        - run : semgrep ci
          env:
            SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    
  audit:
    needs: [security,semgrep]
    runs-on: ubuntu-latest
    steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm
        - name: Install dependencies
          run: npm install --ignore-optional
        - name: Run npm audit
          run: npm audit --audit-level=moderate
          env:
            CI: true
            
        

  lint:
    needs: [security,semgrep]  # attend que security soit OK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --ignore-optional
      - name: Lint
        run: npm run lint

  test:
    needs: [security,semgrep]  # attend que security soit OK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --ignore-optional
      - name: Unit tests
        run: npm run test:unit
      - name: Integration tests
        run: npm run test:integration
      - name: Coverage report
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  deploy:
    needs: [lint, test]  # security et semgrep et npm-audit implicitement attendu car lint+test en dépendent
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --ignore-optional
      - name: Build
        run: npm run build
      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=dist --auth $NETLIFY_AUTH_TOKEN --site $NETLIFY_SITE_ID
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}